services:
  grocery-helper:
    image: ghcr.io/twonkk/groceries:latest
    container_name: grocery-helper
    restart: unless-stopped
    ports:
      - "4827:4827"
    environment:
      PORT: "4827"
      DATA_DIR: "/app/data"
      PUBLIC_URL: "http://10.31.10.10:4827"
      APP_UID: "99"
      APP_GID: "100"
      ALERT_ON_ADD: "false"
      ALERT_DAILY_ENABLED: "false"
      ALERT_DAILY_TIME: "15:00"
      ALERT_TIME_ZONE: "America/Chicago"
      DISCORD_WEBHOOK_URL: ""
      RESEND_API_KEY: ""
      ALERT_EMAIL_TO: ""
      ALERT_EMAIL_FROM: ""
    volumes:
      - /mnt/user/appdata/grocery-helper:/app/data
